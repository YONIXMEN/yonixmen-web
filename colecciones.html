<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sobre Mi | YONIXMEN</title>

<link rel="icon" href="logoarriba.png" type="image/png">

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url("fondo.png");
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
    background-color: #000;
    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* HEADER */
.header {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    background: rgba(0,0,0,0.9);
    padding: 20px;
}

.logo {
    width: 100px;
    filter: drop-shadow(0 0 10px #17e6e6);
    transition: 0.3s;
    cursor: pointer;
}

.logo.playing {
    filter: drop-shadow(0 0 20px red);
}

.logo:hover {
    transform: scale(1.1) rotate(-5deg);
}

h1 {    
    font-family: 'Metal Mania', cursive;
    font-size: clamp(10px, 6vw, 80px);
    color: #ffffff;
}

/* MENÚ */
.nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    background: rgba(0,0,0,0.95);
    padding: 15px 0;
    position: relative;
    margin-top: 25px;
}

.nav::before,
.nav::after {
    content: "";
    position: absolute;
    left: 0;
    width: 100%;
    height: 2px;
    background: #17e6e6;
    box-shadow: 0 0 5px #17e6e6;
}

.nav::before { top: 0; }
.nav::after { bottom: 0; }

.nav a {
    color: #17e6e6;
    text-decoration: none;
    padding: 10px 22px;
    border-radius: 25px;
    transition: 0.3s;
}

.nav a:hover {
    background: #17e6e6;
    color: black;
}

.nav .activo {
    background: #17e6e6;
    color: black;
    font-weight: bold;
}

/* CONTENIDO */
.intro {
    text-align: center;
    max-width: 800px;
    margin: 30px auto;
    background: rgba(15, 15, 15, 0.9);
    padding: 30px;
    border-radius: 20px;
    border: 1px solid #333;
}

/* TITULO */
.intro h2 {
    margin-bottom: 20px;
    color: #17e6e6;
    text-shadow: 0 0 10px #17e6e6;
}

/* GRID PRINCIPAL */
.coleccion-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 25px;
}

/* TARJETAS */
.carro {
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 15px;
    border: 1px solid #222;
    transition: 0.3s;
}

.carro:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 20px #17e6e6;
}

/* 🔥 ÚNICA MODIFICACIÓN */
.carro img {
    width: 100%;
    height: 120px;
    object-fit: contain;
    margin-top: 20px;
    border-radius: 10px;
}

/* NOMBRE */
.carro p {
    color: #17e6e6;
    font-weight: bold;
    margin-top: 8px;
}

/* 🔥 ÁLBUM */
.album {
    margin-top: 10px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}

.album img {
    width: 100%;
    height: 70px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid #333;
    transition: 0.3s;
}

.album img:hover {
    transform: scale(1.1);
    box-shadow: 0 0 10px #17e6e6;
}

/* REDES */
.redes {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.redes a {
    text-decoration: none;
    color: white;
    background: rgba(0,0,0,0.8);
    padding: 10px 20px;
    border-radius: 30px;
    border: 2px solid #ff0000;
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.redes a:hover { 
    background: #17e6e6; 
    color: #000; 
    transform: translateX(-5px); 
}

@media (max-width: 480px) {
    .header { flex-direction: column; }
    .logo { width: 100px; }
}
</style>
</head>

<!-- SCRIPT AUDIO -->
<script>
const audio = document.getElementById("introAudio");
const logo = document.querySelector(".logo");

function playIntro() {
    if (audio.paused) {
        audio.play();
        logo.classList.add("playing");
    } else {
        audio.pause();
        logo.classList.remove("playing");
    }
}

audio.addEventListener("ended", () => {
    logo.classList.remove("playing");
});
</script>
